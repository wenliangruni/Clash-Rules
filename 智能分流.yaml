- name: 所有-手选
  type: select
  include-all: true
  filter: "^((?!(直连|拒绝)).)*$"
- name: 所有-智选
  type: smart
  include-all: true
  uselightgbm: true
  collectdata: true
  interval: 300
  filter: "^((?!(直连|拒绝)).)*$"
  prefer-asn: true
- name: 香港-智选
  type: smart
  include-all: true
  filter: "(?=.*(广港|香港|HK|Hong Kong|HongKong)).*$"
  uselightgbm: true
  prefer-asn: true
- name: 台湾-智选
  type: smart
  include-all: true
  filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|TaiWan|Taiwan)).*$"
  uselightgbm: true
  prefer-asn: true
- name: 日本-智选
  type: smart
  include-all: true
  filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|Japan)).*$"
  uselightgbm: true
  prefer-asn: true
- name: 新加坡-智选
  type: smart
  include-all: true
  filter: "(?=.*(广新|新加坡|SG|坡|狮城|Singapore)).*$"
  uselightgbm: true
  prefer-asn: true
- name: 韩国-智选
  type: smart
  include-all: true
  filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|Korea)).*$"
  uselightgbm: true
  prefer-asn: true
- name: 美国-智选
  type: smart
  include-all: true
  filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|United States)).*$"
  uselightgbm: true
  prefer-asn: true
- name: 英国-智选
  type: smart
  include-all: true
  filter: "(?=.*(英国|英|伦敦|UK|United Kingdom|London)).*$"
  uselightgbm: true
  prefer-asn: true
- name: 其他-智选
  type: smart
  include-all: true
  filter: "^((?!(直连|拒绝|广港|香港|HK|Hong Kong|HongKong|广台|台湾|台灣|TW|Tai Wan|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|Japan|广新|新加坡|SG|坡|狮城|Singapore|广韩|韩国|韓國|KR|首尔|春川|Korea|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|United
    States|英国|UK|United Kingdom|英|London)).)*$"
  uselightgbm: true
  prefer-asn: true
