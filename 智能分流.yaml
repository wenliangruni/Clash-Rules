  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
  - 223.5.5.5
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
  - "+.lan"
  - "+.local"
  - geosite:cn
  respect-rules: false
