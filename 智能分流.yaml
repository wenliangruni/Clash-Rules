proxy-providers:
  机场名:
    url: 
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    path: "./proxy_provider/小火龙"
proxies:
- name: 直连
  type: direct
- name: 拒绝
  type: reject
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: bo3VqUy4
ipv6: false
dns:
